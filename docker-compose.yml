version: '3.3'

services:
  print-estimater:
    container_name: print-estimater
    image: ${CONTAINER_IMAGE}
    restart: always
    ports:
      - "15686:15686"
    volumes:
      - "${DB_LOCAL_STORAGE}/print-estimater.db:/usr/share/printestimater/print-estimater.db"
    labels:
      traefik.enable: "true"
      traefik.http.routers.print-estimater.rule: 'Host("printestimater.${DOMAIN_NAME}")'
      traefik.http.routers.print-estimater.tls: "true"
    networks:
      - proxy-network
    environment:
      ENVIRONMENT: ${ENVIRONMENT}

networks:
  proxy-network:
    name: proxy-network
    external: true